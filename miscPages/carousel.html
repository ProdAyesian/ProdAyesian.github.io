<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennis' Homepage</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/layout.css">
    <script src="/site.js" , defer></script>
    <script src="/js/miscStuff.js" defer></script>
    <script></script>
    <link rel="icon" href="/img/Muyu2WayGradient.png">
    <style>
        button {
            background-color: transparent;
            color: white;
            width: 100px;
        }

        #carousel {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-height: 300px;
            overflow: hidden;
            gap: 10px;
        }

        #carousel img {
            max-height: 300px;
            aspect-ratio: auto 300 / 400;
            border-radius: 10px;
        }

        #buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <!-- topsect -->
    <div class="BannerArea">
        <h1 class="bannerTitle">Dennis' JavaScript Website</h1>
    </div>
    <div id="navSect">
        <nav>
            <ul class="MainNavLayout"><a class=MainNavStyle href="/index.html">Main</a></ul>
            <ul class="MainNavLayout"><a class=MainNavStyle href="/video.html">Video</a></ul>
            <ul class="MainNavLayout"><a class=MainNavStyle href="/misc.html">Misc</a></ul>
            <ul class="MainNavLayout"><a class=MainNavStyle href="">Link</a></ul>
        </nav>
    </div>

    <!-- midsect -->
    <div class="gridLayout">

        <div class="Leftpage">

        </div>
        <div class="Centerpage">
            <main style="text-align: center;">
                <h1>Carousel page</h1>

                <div id="carousel">
                    <img alt="Image 1">
                    <img alt="Image 2">
                    <img alt="Image 3">
                </div>
                <div id="buttons">
                    <button id="prev">Previous</button>
                    <button id="next">Next</button>
                </div>

            </main>
        </div>
        <div class="Rightpage">
            <!-- This could be for some sort of nav -->
        </div>

    </div>
    <!-- bottomsect -->
    <footer>
        <p>This site was made with blood sweat and updog</p>
    </footer>
</body>

</html>
